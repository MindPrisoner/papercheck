<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <main class="container">
        <section class="hero">
            <h1>提交前，先做一次论文体检</h1>
            <p class="subtitle">
                检查结构、规范、论证与答辩风险，生成可执行的修改清单
            </p>
        </section>

        <section class="card">
            <form action="/submit" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="paper_file">上传论文文件</label>
                    <input id="paper_file" name="paper_file" type="file" accept=".docx,.pdf" required />
                </div>

                <div class="form-group">
                    <label for="school_name">学校名称</label>
                    <input id="school_name" name="school_name" type="text" placeholder="例如：某某大学" />
                </div>

                <div class="form-group">
                    <label for="major_name">专业名称</label>
                    <input id="major_name" name="major_name" type="text" placeholder="例如：计算机科学与技术" />
                </div>

                <div class="form-group">
                    <label for="paper_type">论文类型</label>
                    <select id="paper_type" name="paper_type">
                        <option value="本科毕业论文" selected>本科毕业论文</option>
                        <option value="课程论文">课程论文</option>
                        <option value="毕业设计报告">毕业设计报告</option>
                    </select>
                </div>

                <label class="checkbox-row">
                    <input type="checkbox" name="need_defense_pack" checked />
                    <span>生成答辩冲刺包</span>
                </label>

                <button type="submit" class="primary-btn">
                    开始体检
                </button>
            </form>
        </section>

        <section class="tips">
            <p>支持 docx / pdf</p>
            <p>不代写，不承诺任何检测结果</p>
            <p>文件仅用于本次分析，默认 72 小时后删除</p>
        </section>
    </main>
</body>
</html>
